    <script>
        // Konfigurasi Tailwind untuk mendukung class-based dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .fade-in { animation: fadeIn 1.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

<body class="bg-white text-black dark:bg-zinc-950 dark:text-white antialiased">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-xl font-bold tracking-tighter italic">ATAN.</div>
        
        <div class="flex items-center space-x-8">
            <div class="space-x-8 text-[10px] uppercase tracking-[0.3em] font-medium hidden md:flex">
                <a href="#" class="hover:line-through transition-all">Works</a>
                <a href="#" class="hover:line-through transition-all">About</a>
            </div>
            
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors">
                <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 pt-20 pb-32 fade-in">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            
            <div class="order-2 md:order-1">
                <p class="text-[10px] uppercase tracking-[0.4em] mb-6 text-gray-400 dark:text-zinc-500">Digital Creator & Designer</p>
                <h1 class="text-6xl md:text-8xl font-bold leading-[0.9] mb-10 tracking-tighter">
                    CREATING <br> <span class="text-gray-200 dark:text-zinc-800 transition-colors">VOID</span> BEYOND.
                </h1>
                <p class="max-w-sm text-gray-600 dark:text-zinc-400 leading-relaxed mb-12 text-sm md:text-base font-light">
                    Fokus pada minimalisme dan estetika modern. Membangun masa depan digital yang intuitif dan bersih.
                </p>
                <a href="mailto:hello@domain.com" class="inline-block border-b border-black dark:border-white pb-2 font-bold text-xs tracking-widest hover:opacity-50 transition-all">
                    GET IN TOUCH
                </a>
            </div>

            <div class="order-1 md:order-2">
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-gray-200 to-gray-100 dark:from-zinc-800 dark:to-zinc-900 rounded-2xl blur opacity-25"></div>
                    <div class="relative bg-gray-100 dark:bg-zinc-900 aspect-[4/5] rounded-xl overflow-hidden shadow-2xl">
                        <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000" 
                             alt="Hero Image" class="w-full h-full object-cover grayscale brightness-90 contrast-125 dark:brightness-75 transition-all duration-700 group-hover:scale-105">
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="px-8 py-16 border-t border-gray-100 dark:border-zinc-900 max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-[9px] tracking-[0.5em] text-gray-400 dark:text-zinc-600 uppercase font-medium">
        <div class="mb-6 md:mb-0">© 2026 ATANRBX — ALL RIGHTS RESERVED</div>
        <div class="flex space-x-10">
            <a href="#" class="hover:text-black dark:hover:text-white transition-colors">Instagram</a>
            <a href="#" class="hover:text-black dark:hover:text-white transition-colors">Twitter</a>
            <a href="#" class="hover:text-black dark:hover:text-white transition-colors">Behance</a>
        </div>
    </footer>

    <script>
        // Inisialisasi Ikon Lucide
        lucide.createIcons();

        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        // Cek preferensi sebelumnya di localStorage
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
            updateIcon(true);
        } else {
            htmlElement.classList.remove('dark');
            updateIcon(false);
        }

        // Fungsi Toggle Mode
        themeToggleBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                updateIcon(false);
            } else {
                htmlElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                updateIcon(true);
            }
        });

        // Update Ikon secara dinamis
        function updateIcon(isDark) {
            const newIconName = isDark ? 'sun' : 'moon';
            themeIcon.setAttribute('data-lucide', newIconName);
            lucide.createIcons(); // Re-render ikon
        }
    </script>
</body>
