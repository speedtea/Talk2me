<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL | Artisanal Leather Goods</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        'iql-brown': '#3a2a21', // Lebih gelap untuk kontras tinggi
                        'iql-accent': '#8b5e3c', 
                        'iql-dark': '#0f0a09'  // Dark mode lebih pekat agar teks putih "pop out"
                    }
                }
            }
        }
    </script>

    <style>
        :root { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s, color 0.4s; }
        .serif { font-family: 'Playfair Display', serif; }
        
        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            position: relative;
            display: inline-block;
        }
        .brand-logo::after {
            content: ''; position: absolute; width: 100%; transform: scaleX(0); height: 1.5px;
            bottom: -2px; left: 0; background-color: currentColor;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .brand-logo:hover::after { transform: scaleX(1); }
        
        .swiper-pagination-bullet { background: #ccc !important; opacity: 0.5; }
        .swiper-pagination-bullet-active { background: #3a2a21 !important; opacity: 1; }
        .dark .swiper-pagination-bullet-active { background: #f8f1ed !important; }
        
        .float-wa { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
    </style>
</head>
<body class="antialiased bg-[#fdfaf5] text-[#1a1412] dark:bg-iql-dark dark:text-[#f8f1ed]">

    <a href="https://wa.me/6281234567890" target="_blank" class="fixed bottom-6 right-6 z-[100] bg-[#25D366] text-white p-4 rounded-full shadow-2xl float-wa hover:scale-110 transition-transform">
        <i data-lucide="message-circle" class="w-6 h-6"></i>
    </a>

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50 bg-[#fdfaf5]/90 dark:bg-iql-dark/90 backdrop-blur-md border-b border-black/5 dark:border-white/5">
        <div class="brand-logo text-xl md:text-2xl text-iql-brown dark:text-[#f8f1ed]">IQL</div>
        
        <div class="hidden lg:flex space-x-10 text-[10px] uppercase tracking-[0.2em] font-bold">
            <a href="#home" class="text-gray-500 hover:text-iql-brown dark:hover:text-white transition-colors">Home</a>
            <a href="#koleksi" class="text-gray-500 hover:text-iql-brown dark:hover:text-white transition-colors">Shop</a>
            <a href="#" class="text-gray-500 hover:text-iql-brown dark:hover:text-white transition-colors">Instagram</a>
        </div>
        
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5 text-iql-brown"></i>
                <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5 text-yellow-400"></i>
            </button>
            <a href="https://wa.me/6281234567890" class="text-[9px] font-bold uppercase tracking-widest bg-[#1a1412] dark:bg-[#f8f1ed] text-white dark:text-[#1a1412] px-6 py-2.5 rounded-full hover:opacity-80 transition-all shadow-lg">Contact</a>
        </div>
    </nav>

    <header id="home" class="relative w-full h-[70vh] md:h-[85vh]">
        <div class="swiper heroSwiper h-full w-full">
            <div class="swiper-wrapper">
                <div class="swiper-slide relative">
                    <img src="https://images.unsplash.com/photo-1473187983305-f615310e7daa?q=80&w=2000" class="w-full h-full object-cover dark:brightness-[0.6]">
                    <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center text-center text-white p-6">
                        <span class="text-[10px] uppercase tracking-[0.6em] mb-4 font-bold opacity-80">Collection 2026</span>
                        <h1 class="text-6xl md:text-9xl serif mb-12 italic leading-tight">The Heritage</h1>
                        <a href="#koleksi" class="bg-white text-black px-14 py-4 text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-black hover:text-white transition-all">Explore</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section id="koleksi" class="py-28">
        <div class="max-w-7xl mx-auto px-6 mb-20 text-center">
            <h2 class="text-5xl serif italic mb-4">Featured Products</h2>
            <div class="w-20 h-px bg-iql-brown dark:bg-[#f8f1ed] mx-auto opacity-20"></div>
        </div>

        <div class="swiper productSwiper max-w-7xl mx-auto px-6 !pb-16">
            <div class="swiper-wrapper">
                <script>
                    const featured = [
                        { name: "Oxford Tote", price: "1.250.000", img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?q=80&w=800" },
                        { name: "Slim Wallet", price: "450.000", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?q=80&w=800" },
                        { name: "Classic Belt", price: "350.000", img: "https://images.unsplash.com/photo-1530173336844-31533318079a?q=80&w=800" },
                        { name: "Traveler Pouch", price: "750.000", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=800" }
                    ];
                    document.write(featured.map(p => `
                        <div class="swiper-slide px-3">
                            <div class="group bg-white dark:bg-[#1a1412] rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-700 border border-black/5 dark:border-white/5">
                                <div class="relative aspect-[4/5] overflow-hidden">
                                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                                    <a href="https://wa.me/6281234567890" class="absolute bottom-0 w-full bg-[#1a1412] dark:bg-[#f8f1ed] text-white dark:text-[#1a1412] py-5 text-center text-[10px] font-bold uppercase translate-y-full group-hover:translate-y-0 transition-transform duration-500">Order via WhatsApp</a>
                                </div>
                                <div class="p-8 text-center">
                                    <h3 class="serif text-xl mb-2">${p.name}</h3>
                                    <p class="text-iql-accent dark:text-[#d4af37] font-bold tracking-widest text-sm">IDR ${p.price}</p>
                                </div>
                            </div>
                        </div>
                    `).join(''));
                </script>
            </div>
            <div class="swiper-pagination !static mt-12"></div>
        </div>
    </section>

    <footer class="py-24 px-6 bg-white dark:bg-[#0a0706] border-t border-black/5 dark:border-white/5 text-center">
        <div class="brand-logo text-4xl mb-12 text-iql-brown dark:text-[#f8f1ed]">IQL</div>
        
        <div class="mb-16">
            <p class="text-[9px] uppercase tracking-[0.4em] text-gray-400 dark:text-gray-600 mb-8 font-bold">Secure Payment</p>
            <div class="flex flex-wrap justify-center items-center gap-8 md:gap-12 opacity-80 dark:opacity-50 grayscale hover:grayscale-0 transition-all duration-500">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" alt="BCA" class="h-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/Bank_Mandiri_logo_2016.svg" alt="Mandiri" class="h-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Logo_GoPay.svg" alt="GOPAY" class="h-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Logo_ShopeePay.svg" alt="ShopeePay" class="h-4">
            </div>
        </div>
        
        <p class="text-[10px] text-gray-400 dark:text-gray-700 uppercase tracking-[0.5em] font-light italic">Handcrafted in Indonesia — © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        lucide.createIcons();
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
                themeToggleLightIcon.classList.add('hidden');
            }
        }
        updateIcons();

        themeToggleBtn.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        });

        new Swiper(".heroSwiper", { loop: true, autoplay: { delay: 5000 } });
        new Swiper(".productSwiper", { 
            slidesPerView: 1.2, spaceBetween: 20, 
            pagination: { el: ".swiper-pagination", clickable: true },
            breakpoints: { 768: { slidesPerView: 2.5 }, 1024: { slidesPerView: 3.5 } } 
        });
    </script>
</body>
</html>
