<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL | Artisanal Leather Goods</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 'iql-brown': '#3a2a21', 'iql-accent': '#8b5e3c', 'iql-gold': '#d4af37', 'iql-dark': '#0f0a09' } 
                } 
            } 
        }
    </script>

    <style>
        :root { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.5s, color 0.5s; }
        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5em; }
        #product-modal.hidden { opacity: 0; pointer-events: none; display: none; }
        #product-modal.flex { opacity: 1; pointer-events: auto; }
        .swiper-button-disabled { opacity: 0.3; cursor: auto !important; }
    </style>
</head>
<body class="antialiased bg-[#fdfaf5] text-[#1a1412] dark:bg-iql-dark dark:text-[#f8f1ed]">

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50 bg-[#fdfaf5]/90 dark:bg-iql-dark/90 backdrop-blur-md border-b border-black/5 dark:border-white/5">
        <a href="#" class="brand-logo text-xl md:text-2xl text-iql-brown dark:text-[#f8f1ed]">IQL</a>
        <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
            <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
            <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5 text-yellow-400"></i>
        </button>
    </nav>

    <section class="h-[75vh] md:h-[85vh] bg-black relative flex items-center justify-center overflow-hidden">
        <img src="iqbal.jpg" class="max-w-full max-h-full object-contain brightness-110">
        <div class="absolute inset-0 flex flex-col items-center justify-end pb-20 text-center text-white p-6 bg-gradient-to-t from-black/80 via-transparent to-transparent">
            <h1 class="text-5xl md:text-8xl serif italic mb-4">The Visionary</h1>
            <p class="text-[10px] tracking-[0.5em] uppercase opacity-80">Crafting Legacy with Soul</p>
        </div>
    </section>

    <section class="py-20 max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-2xl md:text-4xl serif italic">Recent Products</h2>
                <div class="h-1 w-12 bg-iql-accent mt-2"></div>
            </div>
            <div class="flex space-x-2">
                <button class="recent-prev p-2 border border-black/10 dark:border-white/10 rounded-full hover:bg-iql-brown hover:text-white transition-all"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                <button class="recent-next p-2 border border-black/10 dark:border-white/10 rounded-full hover:bg-iql-brown hover:text-white transition-all"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            </div>
        </div>
        <div class="swiper recentSwiper">
            <div class="swiper-wrapper" id="recent-container"></div>
        </div>
    </section>

    <section id="koleksi" class="py-20 bg-black/5 dark:bg-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <div class="text-center mb-16">
                <p class="text-[10px] uppercase tracking-[0.5em] text-iql-accent font-bold mb-2">Our Pride</p>
                <h2 class="text-4xl md:text-6xl serif italic">More Collection</h2>
            </div>
            <div class="swiper collectionSwiper !pb-12">
                <div class="swiper-wrapper" id="collection-container"></div>
                <div class="swiper-pagination !-bottom-2"></div>
            </div>
        </div>
    </section>

    <footer class="py-16 text-center border-t border-black/5 dark:border-white/5">
        <div class="brand-logo text-xl mb-4 text-iql-brown dark:text-[#f8f1ed]">IQL</div>
        <p class="text-[8px] uppercase tracking-[0.4em] opacity-30">© 2026 IQL Artisanal Leather Goods</p>
    </footer>

    <div id="product-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-[#fdfaf5] dark:bg-[#1a1412] max-w-3xl w-full rounded-[2.5rem] overflow-hidden relative shadow-2xl flex flex-col md:row">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-10 p-2 bg-black/5 dark:bg-white/10 rounded-full hover:bg-red-500 hover:text-white transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="flex flex-col md:flex-row w-full">
                <div class="w-full md:w-1/2 aspect-square"><img id="modal-img" src="" class="w-full h-full object-cover"></div>
                <div class="w-full md:w-1/2 p-10 flex flex-col justify-center">
                    <h2 id="modal-title" class="text-3xl serif italic mb-2 text-iql-brown dark:text-[#f8f1ed]"></h2>
                    <p id="modal-price" class="text-iql-accent font-bold mb-6"></p>
                    <p id="modal-desc" class="text-sm opacity-70 mb-8 leading-relaxed font-light"></p>
                    <a id="modal-wa-link" href="#" target="_blank" class="bg-iql-brown dark:bg-[#f8f1ed] text-white dark:text-iql-dark text-center py-4 rounded-full text-[10px] font-bold uppercase tracking-widest">Inquire via WhatsApp</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        lucide.createIcons();

        const recentData = [
            { name: "Slim Bifold", price: "450.000", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?q=80", desc: "Dompet ramping dengan jahitan tangan manual." },
            { name: "Brass Belt", price: "350.000", img: "https://images.unsplash.com/photo-1530173336844-31533318079a?q=80", desc: "Sabuk kulit sapi nabati dengan gesper kuningan asli." },
            { name: "Card Holder", price: "150.000", img: "https://images.unsplash.com/photo-1614352232749-92c2a9c336b9?q=80", desc: "Penyimpan kartu minimalis untuk saku depan." },
            { name: "Key Organizer", price: "125.000", img: "https://images.unsplash.com/photo-1582142839970-2b9e04b60f25?q=80", desc: "Rapikan kunci Anda dengan pelindung kulit." },
            { name: "Watch Roll", price: "750.000", img: "https://images.unsplash.com/photo-1522337360788-8b13df772ce1?q=80", desc: "Pelindung jam tangan premium untuk travel." },
            { name: "Passport Sleeve", price: "300.000", img: "https://images.unsplash.com/photo-1544816155-12df9643f363?q=80", desc: "Sampul paspor kulit untuk petualangan Anda." },
            { name: "Leather Balm", price: "95.000", img: "https://images.unsplash.com/photo-1556228720-195a672e8a03?q=80", desc: "Krim perawatan kulit agar tetap lentur." },
            { name: "Camera Strap", price: "400.000", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?q=80", desc: "Tali kamera kuat dengan bantalan bahu." },
            { name: "Valet Tray", price: "200.000", img: "https://images.unsplash.com/photo-1582142839970-2b9e04b60f25?q=80", desc: "Nampan kulit untuk barang harian di meja." },
            { name: "Cord Wrap", price: "85.000", img: "https://images.unsplash.com/photo-1614352232749-92c2a9c336b9?q=80", desc: "Pengikat kabel agar tidak kusut." }
        ];

        const collectionData = [
            { name: "Oxford Tote", price: "1.250.000", img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?q=80", desc: "Tas tote besar untuk kebutuhan harian profesional." },
            { name: "Classic Briefcase", price: "1.850.000", img: "https://images.unsplash.com/photo-1544816155-12df9643f363?q=80", desc: "Tas kerja elegan dengan struktur kokoh." },
            { name: "Heritage Duffel", price: "2.100.000", img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?q=80", desc: "Tas travel kapasitas maksimal untuk weekend getaway." },
            { name: "Urban Backpack", price: "1.450.000", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80", desc: "Ransel kulit modern untuk gaya hidup urban." },
            { name: "Saddle Messenger", price: "1.300.000", img: "https://images.unsplash.com/photo-1524498250077-390f9e378fc0?q=80", desc: "Tas selempang dengan penutup flap magnetik." },
            { name: "Signature Satchel", price: "1.100.000", img: "https://images.unsplash.com/photo-1566150905458-1bf1fd113f0d?q=80", desc: "Desain klasik yang tak pernah lekang oleh waktu." },
            { name: "Patina Folio", price: "650.000", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80", desc: "Penyimpan dokumen dengan teknik pewarnaan patina." },
            { name: "Craftsman Apron", price: "850.000", img: "https://images.unsplash.com/photo-1598965675045-45c5e72c7d05?q=80", desc: "Celemek kulit pelindung untuk pekerjaan berat." },
            { name: "Weekender Bag", price: "1.950.000", img: "https://images.unsplash.com/photo-1547949003-9792a18a2601?q=80", desc: "Tas kabin pesawat dengan desain mewah." },
            { name: "Minimalist Clutch", price: "550.000", img: "https://images.unsplash.com/photo-1566150905458-1bf1fd113f0d?q=80", desc: "Tas tangan simpel untuk ponsel dan dompet." }
        ];

        // Render Recent
        document.getElementById('recent-container').innerHTML = recentData.map(p => `
            <div class="swiper-slide cursor-pointer group" onclick="openModal('${p.name}', '${p.price}', '${p.img}', '${p.desc}')">
                <div class="bg-white dark:bg-white/5 p-4 rounded-3xl border border-black/5 dark:border-white/5 shadow-sm group-hover:shadow-md transition-all">
                    <div class="aspect-square rounded-2xl overflow-hidden mb-4">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <h3 class="serif text-lg">${p.name}</h3>
                    <p class="text-[10px] font-bold text-iql-accent mt-1">IDR ${p.price}</p>
                </div>
            </div>`).join('');

        // Render More Collection
        document.getElementById('collection-container').innerHTML = collectionData.map(p => `
            <div class="swiper-slide cursor-pointer group" onclick="openModal('${p.name}', '${p.price}', '${p.img}', '${p.desc}')">
                <div class="relative aspect-[4/5] overflow-hidden rounded-[2.5rem] bg-gray-200">
                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="absolute bottom-8 left-8 text-white opacity-0 group-hover:opacity-100 transition-all translate-y-4 group-hover:translate-y-0">
                        <h3 class="serif text-3xl mb-1">${p.name}</h3>
                        <p class="text-[10px] tracking-widest uppercase">IDR ${p.price}</p>
                    </div>
                </div>
            </div>`).join('');

        // Init Swipers
        new Swiper(".recentSwiper", { 
            slidesPerView: 1.5, 
            spaceBetween: 20, 
            navigation: { nextEl: ".recent-next", prevEl: ".recent-prev" },
            breakpoints: { 768: { slidesPerView: 3.5 }, 1024: { slidesPerView: 5.2 } } 
        });

        new Swiper(".collectionSwiper", { 
            slidesPerView: 1.1, 
            spaceBetween: 30, 
            centeredSlides: true,
            loop: true,
            pagination: { el: ".swiper-pagination", clickable: true },
            breakpoints: { 1024: { slidesPerView: 2.8 } } 
        });

        function openModal(name, price, img, desc) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = 'IDR ' + price;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-wa-link').href = `https://wa.me/6281234567890?text=Halo+IQL,+saya+tertarik+dengan+${name}`;
            document.getElementById('product-modal').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }
        function closeModal() {
            document.getElementById('product-modal').classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        // Theme Toggle Logic
        const themeBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
            } else {
                darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
            }
        }
        updateIcons();
        themeBtn.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        }
    </script>
</body>
                        </html>
