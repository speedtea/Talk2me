<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL | Artisanal Leather Goods</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 'iql-brown': '#3a2a21', 'iql-accent': '#8b5e3c', 'iql-gold': '#d4af37', 'iql-dark': '#0f0a09' } 
                } 
            } 
        }
    </script>

    <style>
        :root { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.5s, color 0.5s; }
        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5em; }
        .hero-img { image-rendering: -webkit-optimize-contrast; image-rendering: auto; }
        #product-modal.hidden { opacity: 0; pointer-events: none; display: none; }
        #product-modal.flex { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="antialiased bg-[#fdfaf5] text-[#1a1412] dark:bg-iql-dark dark:text-[#f8f1ed]">

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50 bg-[#fdfaf5]/90 dark:bg-iql-dark/90 backdrop-blur-md border-b border-black/5 dark:border-white/5">
        <a href="#" class="brand-logo text-xl md:text-2xl text-iql-brown dark:text-[#f8f1ed]">IQL</a>
        <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
            <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
            <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5 text-yellow-400"></i>
        </button>
    </nav>

    <div class="h-[80vh] md:h-[90vh] bg-black relative flex items-center justify-center overflow-hidden">
        <img src="iqbal.jpg" class="hero-img max-w-full max-h-full object-contain brightness-110">
        <div class="absolute inset-0 flex flex-col items-center justify-end pb-20 text-center text-white px-6 bg-gradient-to-t from-black/80 via-transparent to-transparent">
            <h1 class="text-5xl md:text-8xl serif italic mb-3 tracking-tight" style="text-shadow: 0 4px 10px rgba(0,0,0,0.8);">The Visionary</h1>
            <p class="text-[10px] md:text-xs tracking-[0.6em] uppercase opacity-90 font-medium">Crafting Legacy with Soul</p>
        </div>
    </div>

    <section class="py-24 max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-end mb-16">
            <div>
                <h2 class="text-4xl md:text-5xl serif italic mb-4">Featured Collection</h2>
                <p class="text-xs uppercase tracking-widest opacity-50">Our Signature Pieces</p>
            </div>
            <div class="hidden md:flex space-x-4">
                <div class="prev-f p-4 border border-black/20 dark:border-white/20 rounded-full cursor-pointer hover:bg-iql-brown hover:text-white transition-all"><i data-lucide="arrow-left" class="w-5 h-5"></i></div>
                <div class="next-f p-4 border border-black/20 dark:border-white/20 rounded-full cursor-pointer hover:bg-iql-brown hover:text-white transition-all"><i data-lucide="arrow-right" class="w-5 h-5"></i></div>
            </div>
        </div>
        <div class="swiper featuredSwiper !pb-12">
            <div class="swiper-wrapper" id="featured-list"></div>
        </div>
    </section>

    <section class="py-24 bg-black/5 dark:bg-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-end mb-16">
                <div>
                    <h2 class="text-4xl md:text-5xl serif italic mb-4">More Collection</h2>
                    <p class="text-xs uppercase tracking-widest opacity-50">Explore More Styles</p>
                </div>
                <div class="hidden md:flex space-x-4">
                    <div class="prev-m p-4 border border-black/20 dark:border-white/20 rounded-full cursor-pointer hover:bg-iql-brown hover:text-white transition-all"><i data-lucide="arrow-left" class="w-5 h-5"></i></div>
                    <div class="next-m p-4 border border-black/20 dark:border-white/20 rounded-full cursor-pointer hover:bg-iql-brown hover:text-white transition-all"><i data-lucide="arrow-right" class="w-5 h-5"></i></div>
                </div>
            </div>
            <div class="swiper moreSwiper !pb-12">
                <div class="swiper-wrapper" id="more-list"></div>
            </div>
        </div>
    </section>

    <div id="product-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-[#fdfaf5] dark:bg-[#1a1412] max-w-3xl w-full rounded-[2.5rem] overflow-hidden relative shadow-2xl flex flex-col md:flex-row">
            
            <button onclick="closeModal()" class="absolute top-6 right-6 z-50 p-3 bg-black text-white dark:bg-white dark:text-black rounded-full shadow-xl hover:scale-110 transition-transform flex items-center justify-center">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>

            <div class="w-full md:w-1/2 aspect-square">
                <img id="modal-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="w-full md:w-1/2 p-10 flex flex-col justify-center">
                <h2 id="modal-title" class="text-3xl serif italic mb-2 text-iql-brown dark:text-[#f8f1ed]"></h2>
                <p id="modal-price" class="text-iql-accent font-bold mb-6 text-xl"></p>
                <p id="modal-desc" class="text-sm opacity-70 mb-8 leading-relaxed"></p>
                <a id="modal-wa-link" href="#" target="_blank" class="bg-iql-brown dark:bg-[#f8f1ed] text-white dark:text-iql-dark text-center py-4 rounded-full text-[10px] font-bold uppercase tracking-widest hover:opacity-90 transition-opacity">Order via WhatsApp</a>
            </div>
        </div>
    </div>

    <footer class="py-20 text-center border-t border-black/5 dark:border-white/5">
        <div class="brand-logo text-2xl mb-8 text-iql-brown dark:text-[#f8f1ed]">IQL</div>
        <p class="text-[9px] uppercase tracking-[0.6em] opacity-30">© 2026 IQL Artisanal Leather Goods</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        lucide.createIcons();

        const featuredProducts = [
            { name: "Oxford Tote", price: "1.250.000", img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?q=80", desc: "Tas tote premium berbahan pull-up leather terbaik." },
            { name: "Slim Wallet", price: "450.000", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?q=80", desc: "Dompet ramping untuk kartu dan uang kertas." },
            { name: "Classic Belt", price: "350.000", img: "https://images.unsplash.com/photo-1530173336844-31533318079a?q=80", desc: "Ikat pinggang dengan gesper logam berkualitas tinggi." },
            { name: "Travel Case", price: "750.000", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80", desc: "Penyimpan kebutuhan perjalanan Anda dengan rapi." }
        ];

        const moreProducts = [
            { name: "Passport Sleeve", price: "300.000", img: "https://images.unsplash.com/photo-1544816155-12df9643f363?q=80" },
            { name: "Watch Roll", price: "850.000", img: "https://images.unsplash.com/photo-1522337360788-8b13df772ce1?q=80" },
            { name: "Card Holder", price: "150.000", img: "https://images.unsplash.com/photo-1614352232749-92c2a9c336b9?q=80" },
            { name: "Camera Strap", price: "400.000", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?q=80" }
        ];

        function renderProducts(id, data) {
            document.getElementById(id).innerHTML = data.map(p => `
                <div class="swiper-slide cursor-pointer group" onclick="openModal('${p.name}', '${p.price}', '${p.img}', '${p.desc || 'Produk buatan tangan dengan kualitas tinggi.'}')">
                    <div class="relative aspect-[3/4] overflow-hidden rounded-[2.5rem] bg-gray-100 dark:bg-white/5 shadow-lg transition-all duration-700">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="absolute bottom-8 left-8 text-white translate-y-4 group-hover:translate-y-0 transition-all duration-500">
                            <h3 class="serif text-2xl mb-1">${p.name}</h3>
                            <p class="text-[10px] tracking-widest uppercase opacity-70">IDR ${p.price}</p>
                        </div>
                    </div>
                </div>`).join('');
        }

        renderProducts('featured-list', featuredProducts);
        renderProducts('more-list', moreProducts);

        new Swiper(".featuredSwiper", { 
            slidesPerView: 1.2, spaceBetween: 20, 
            navigation: { nextEl: ".next-f", prevEl: ".prev-f" }, 
            breakpoints: { 1024: { slidesPerView: 3.2 } } 
        });

        new Swiper(".moreSwiper", { 
            slidesPerView: 1.2, spaceBetween: 20, 
            navigation: { nextEl: ".next-m", prevEl: ".prev-m" }, 
            breakpoints: { 1024: { slidesPerView: 3.2 } } 
        });

        function openModal(name, price, img, desc) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = 'IDR ' + price;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-wa-link').href = `https://wa.me/6281234567890?text=Halo+IQL,+saya+tertarik+dengan+${name}`;
            document.getElementById('product-modal').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('product-modal').classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        const themeBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        
        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
            } else {
                darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
            }
        }
        updateIcons();
        themeBtn.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        }
    </script>
</body>
                                                                                                                                                                                                                       </html>
