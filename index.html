<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL | Artisanal Leather Goods</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'iql-brown': '#3a2a21', 'iql-accent': '#8b5e3c', 'iql-dark': '#0f0a09' } } } }
    </script>

    <style>
        :root { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s; }
        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5em; }
        .swiper-pagination-bullet-active { background: white !important; }
        #product-modal.hidden { opacity: 0; pointer-events: none; display: none; }
        #product-modal.flex { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="antialiased bg-[#fdfaf5] text-[#1a1412] dark:bg-iql-dark dark:text-[#f8f1ed]">

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50 bg-[#fdfaf5]/90 dark:bg-iql-dark/90 backdrop-blur-md border-b border-black/5 dark:border-white/5">
        <a href="#" class="brand-logo text-xl md:text-2xl text-iql-brown dark:text-[#f8f1ed]">IQL</a>
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10">
                <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
                <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5 text-yellow-400"></i>
            </button>
        </div>
    </nav>

    <div class="swiper heroSwiper h-[60vh] md:h-[80vh]">
        <div class="swiper-wrapper">
            <div class="swiper-slide relative">
                <img src="https://images.unsplash.com/photo-1473187983305-f615310e7daa?q=80&w=2000" class="w-full h-full object-cover brightness-50">
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center text-white p-6">
                    <span class="text-[10px] tracking-[0.5em] mb-4 uppercase">New Arrival</span>
                    <h2 class="text-5xl md:text-8xl serif italic mb-8">The Heritage</h2>
                    <a href="#koleksi" class="border border-white px-10 py-3 text-[10px] uppercase tracking-widest hover:bg-white hover:text-black transition-all">Explore</a>
                </div>
            </div>
            <div class="swiper-slide relative">
                <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?q=80&w=2000" class="w-full h-full object-cover brightness-50">
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center text-white p-6">
                    <span class="text-[10px] tracking-[0.5em] mb-4 uppercase">Limited Edition</span>
                    <h2 class="text-5xl md:text-8xl serif italic mb-8">Crafted Soul</h2>
                    <p class="text-[10px] tracking-[0.3em] opacity-70">Exclusive 15% Off This Month</p>
                </div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <section id="koleksi" class="py-24 bg-white/30 dark:bg-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-3xl serif italic">Featured Goods</h2>
                    <p class="text-[10px] uppercase tracking-widest opacity-50 mt-2">Selected artisanal pieces</p>
                </div>
            </div>
            
            <div class="swiper productSwiper">
                <div class="swiper-wrapper" id="featured-grid">
                    </div>
            </div>
        </div>
    </section>

    <section class="py-12 max-w-7xl mx-auto px-6 mb-24">
        <h3 class="text-center text-[10px] uppercase tracking-[0.5em] mb-16 opacity-30">More To Discover</h3>
        <div class="grid grid-cols-2 md:grid-cols-2 gap-8 md:gap-16" id="more-grid">
            </div>
    </section>

    <div class="fixed bottom-8 left-8 z-[100]">
        <button onclick="document.getElementById('koleksi').scrollIntoView({behavior: 'smooth'})" 
                class="bg-[#1a1412] dark:bg-[#f8f1ed] text-white dark:text-[#1a1412] p-5 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all flex items-center group">
            <i data-lucide="shopping-bag" class="w-6 h-6"></i>
            <span class="max-w-0 opacity-0 group-hover:max-w-xs group-hover:opacity-100 group-hover:ml-3 transition-all duration-500 text-[10px] font-bold uppercase tracking-widest whitespace-nowrap">
                Shop Now
            </span>
        </button>
    </div>

    <div id="product-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-[#fdfaf5] dark:bg-[#1a1412] max-w-2xl w-full rounded-3xl overflow-hidden relative shadow-2xl flex flex-col md:flex-row">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 p-2 bg-black/5 dark:bg-white/10 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="w-full md:w-1/2 aspect-square"><img id="modal-img" src="" class="w-full h-full object-cover"></div>
            <div class="w-full md:w-1/2 p-10 flex flex-col justify-center">
                <h2 id="modal-title" class="text-3xl serif italic mb-2"></h2>
                <p id="modal-price" class="text-iql-accent font-bold mb-6"></p>
                <p id="modal-desc" class="text-sm opacity-70 mb-8 leading-relaxed"></p>
                <a id="modal-wa-link" href="#" target="_blank" class="bg-[#1a1412] dark:bg-[#f8f1ed] text-white dark:text-[#1a1412] text-center py-4 rounded-full text-[10px] font-bold uppercase tracking-widest">Order WhatsApp</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        lucide.createIcons();

        const allProducts = [
            { name: "Oxford Tote", price: "1.250.000", img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?q=80&w=800", desc: "Premium pull-up leather tote bag." },
            { name: "Slim Wallet", price: "450.000", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?q=80&w=800", desc: "Minimalist bifold slim wallet." },
            { name: "Classic Belt", price: "350.000", img: "https://images.unsplash.com/photo-1530173336844-31533318079a?q=80&w=800", desc: "Solid brass buckle leather belt." },
            { name: "Travel Case", price: "750.000", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=800", desc: "Versatile leather travel pouch." },
            { name: "Card Holder", price: "150.000", img: "https://images.unsplash.com/photo-1614352232749-92c2a9c336b9?q=80&w=800", desc: "Compact everyday card holder." },
            { name: "Camera Strap", price: "250.000", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?q=80&w=800", desc: "Professional leather camera strap." }
        ];

        // Render 4 Featured Slides
        document.getElementById('featured-grid').innerHTML = allProducts.slice(0, 4).map(p => `
            <div class="swiper-slide" onclick="openModal('${p.name}', '${p.price}', '${p.img}', '${p.desc}')">
                <div class="relative aspect-[3/4] overflow-hidden rounded-2xl mb-4 group cursor-pointer">
                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    <div class="absolute bottom-4 left-4 text-white drop-shadow-lg">
                        <h3 class="serif text-xl">${p.name}</h3>
                        <p class="text-[10px] tracking-widest uppercase opacity-80">IDR ${p.price}</p>
                    </div>
                </div>
            </div>
        `).join('');

        // Render 2 Extra Grid
        document.getElementById('more-grid').innerHTML = allProducts.slice(4, 6).map(p => `
            <div class="cursor-pointer group text-center" onclick="openModal('${p.name}', '${p.price}', '${p.img}', '${p.desc}')">
                <div class="aspect-square overflow-hidden rounded-full mb-6 max-w-[200px] mx-auto border border-black/5 dark:border-white/5">
                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                </div>
                <h3 class="serif text-lg">${p.name}</h3>
                <p class="text-[9px] opacity-40 uppercase tracking-widest">IDR ${p.price}</p>
            </div>
        `).join('');

        // Swiper Inits
        new Swiper(".heroSwiper", { loop: true, autoplay: { delay: 4000 }, pagination: { el: ".swiper-pagination", clickable: true } });
        new Swiper(".productSwiper", { slidesPerView: 1.3, spaceBetween: 20, breakpoints: { 1024: { slidesPerView: 4 } } });

        function openModal(name, price, img, desc) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = 'IDR ' + price;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-wa-link').href = `https://wa.me/6281234567890?text=Order+${name}`;
            document.getElementById('product-modal').classList.replace('hidden', 'flex');
        }
        function closeModal() { document.getElementById('product-modal').classList.replace('flex', 'hidden'); }

        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
            } else {
                darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
            }
        }
        updateIcons();
        themeBtn.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        }
    </script>
</body>
    </html>
