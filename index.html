<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL | Artisanal Leather Goods</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        'iql-brown': '#3a2a21', 
                        'iql-accent': '#8b5e3c', 
                        'iql-gold': '#d4af37',
                        'iql-dark': '#0f0a09' 
                    } 
                } 
            } 
        }
    </script>

    <style>
        :root { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.5s, color 0.5s; }
        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5em; }
        
        /* Swiper Custom */
        .swiper-pagination-bullet { background: rgba(255,255,255,0.5); opacity: 1; }
        .swiper-pagination-bullet-active { background: white !important; width: 24px; border-radius: 4px; transition: all 0.3s; }
        
        /* Modal Smoothness */
        #product-modal { transition: all 0.4s ease-in-out; }
        #product-modal.hidden { opacity: 0; pointer-events: none; display: none; }
        #product-modal.flex { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="antialiased bg-[#fdfaf5] text-[#1a1412] dark:bg-iql-dark dark:text-[#f8f1ed]">

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50 bg-[#fdfaf5]/90 dark:bg-iql-dark/90 backdrop-blur-md border-b border-black/5 dark:border-white/5">
        <a href="#" class="brand-logo text-xl md:text-2xl text-iql-brown dark:text-[#f8f1ed] hover:opacity-60 transition-all">IQL</a>
        <div class="flex items-center space-x-5">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
                <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5 text-yellow-400"></i>
            </button>
            <a href="https://wa.me/6281234567890" class="text-[10px] font-bold uppercase tracking-widest border border-iql-brown dark:border-[#f8f1ed] px-6 py-2 rounded-full hover:bg-iql-brown hover:text-white dark:hover:bg-[#f8f1ed] dark:hover:text-black transition-all">Contact</a>
        </div>
    </nav>

    <div class="swiper heroSwiper h-[65vh] md:h-[85vh] w-full">
        <div class="swiper-wrapper">
            <div class="swiper-slide relative overflow-hidden">
                <img src="https://images.unsplash.com/photo-1473187983305-f615310e7daa?q=80&w=2000" class="w-full h-full object-cover brightness-[0.6]">
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center text-white px-6">
                    <h2 class="text-5xl md:text-8xl serif italic mb-4 translate-y-4 opacity-0 animate-[fadeInUp_1s_ease_forwards]">The Heritage</h2>
                    <p class="text-[10px] md:text-xs tracking-[0.6em] uppercase mb-8 opacity-0 animate-[fadeIn_1.5s_ease_forwards]">Artisanal Leather Excellence</p>
                    <a href="#koleksi" class="bg-white text-black px-10 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-iql-brown hover:text-white transition-all">Discover Now</a>
                </div>
            </div>
            <div class="swiper-slide relative overflow-hidden">
                <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?q=80&w=2000" class="w-full h-full object-cover brightness-[0.6]">
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center text-white px-6">
                    <span class="bg-iql-accent px-4 py-1 text-[9px] uppercase tracking-widest mb-4">Limited Offer</span>
                    <h2 class="text-5xl md:text-7xl serif italic mb-4 text-iql-gold">Timeless Craft</h2>
                    <p class="max-w-md text-sm md:text-base opacity-80 mb-8 font-light italic">Dapatkan potongan khusus untuk koleksi dompet eksklusif bulan ini.</p>
                </div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <section id="koleksi" class="py-24 overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 mb-12 flex justify-between items-end">
            <div>
                <h2 class="text-3xl md:text-4xl serif italic text-iql-brown dark:text-[#f8f1ed]">Featured Goods</h2>
                <div class="w-12 h-0.5 bg-iql-accent mt-4"></div>
            </div>
            <p class="text-[9px] uppercase tracking-widest opacity-40 hidden md:block italic">Swipe to explore</p>
        </div>
        
        <div class="swiper productSwiper max-w-7xl mx-auto px-6 !pb-16">
            <div class="swiper-wrapper" id="featured-list">
                </div>
        </div>
    </section>

    <section class="pb-32 max-w-5xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12" id="extra-list">
            </div>
    </section>

    <div class="fixed bottom-8 left-8 z-[100]">
        <button onclick="document.getElementById('koleksi').scrollIntoView({behavior: 'smooth'})" 
                class="bg-iql-brown dark:bg-[#f8f1ed] text-white dark:text-iql-dark p-5 rounded-full shadow-[0_20px_40px_rgba(0,0,0,0.3)] hover:scale-110 active:scale-95 transition-all flex items-center group">
            <i data-lucide="shopping-bag" class="w-6 h-6"></i>
            <span class="max-w-0 opacity-0 group-hover:max-w-xs group-hover:opacity-100 group-hover:ml-4 transition-all duration-500 text-[10px] font-bold uppercase tracking-[0.2em] whitespace-nowrap">
                Shop Collection
            </span>
        </button>
    </div>

    <div id="product-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-[#fdfaf5] dark:bg-[#1a1412] max-w-2xl w-full rounded-[2.5rem] overflow-hidden relative shadow-2xl flex flex-col md:flex-row border border-white/10">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-10 p-2 bg-black/5 dark:bg-white/10 rounded-full hover:bg-red-500 hover:text-white transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="w-full md:w-1/2 aspect-square">
                <img id="modal-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="w-full md:w-1/2 p-10 flex flex-col justify-center">
                <h2 id="modal-title" class="text-3xl md:text-4xl serif italic mb-2 text-iql-brown dark:text-[#f8f1ed]"></h2>
                <p id="modal-price" class="text-iql-accent dark:text-iql-gold font-bold text-xl mb-6"></p>
                <p id="modal-desc" class="text-sm opacity-70 mb-10 leading-relaxed font-light dark:text-gray-300"></p>
                <a id="modal-wa-link" href="#" target="_blank" class="bg-iql-brown dark:bg-[#f8f1ed] text-white dark:text-iql-dark text-center py-5 rounded-full text-[10px] font-bold uppercase tracking-widest hover:opacity-80 transition-all shadow-xl">
                    Order via WhatsApp
                </a>
            </div>
        </div>
    </div>

    <footer class="py-20 text-center border-t border-black/5 dark:border-white/5 opacity-50">
        <div class="brand-logo text-2xl mb-4">IQL</div>
        <p class="text-[8px] uppercase tracking-[0.5em]">Handcrafted in Solo, Indonesia • © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        lucide.createIcons();

        const products = [
            { name: "Oxford Tote", price: "1.250.000", img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?q=80&w=800", desc: "Tas tote berkapasitas besar dengan material kulit sapi pull-up asli yang mewah." },
            { name: "Slim Wallet", price: "450.000", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?q=80&w=800", desc: "Dompet ramping dengan konstruksi tanpa jahitan mesin untuk ketahanan maksimal." },
            { name: "Classic Belt", price: "350.000", img: "https://images.unsplash.com/photo-1530173336844-31533318079a?q=80&w=800", desc: "Ikat pinggang kulit sapi kualitas ekspor dengan gesper solid brass." },
            { name: "Travel Case", price: "750.000", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=800", desc: "Tempat penyimpanan barang berharga Anda saat melakukan perjalanan jauh." },
            { name: "Card Holder", price: "150.000", img: "https://images.unsplash.com/photo-1614352232749-92c2a9c336b9?q=80&w=800", desc: "Minimalis, elegan, dan praktis untuk menyimpan kartu esensial Anda." },
            { name: "Camera Strap", price: "250.000", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?q=80&w=800", desc: "Tali kamera kulit yang kuat dan nyaman untuk mendukung hobi fotografi Anda." }
        ];

        // Render 4 Slide Utama
        document.getElementById('featured-list').innerHTML = products.slice(0, 4).map(p => `
            <div class="swiper-slide cursor-pointer group" onclick="openModal('${p.name}', '${p.price}', '${p.img}', '${p.desc}')">
                <div class="relative aspect-[3/4] overflow-hidden rounded-[2rem] bg-gray-200 dark:bg-white/5 shadow-lg group-hover:shadow-2xl transition-all duration-700">
                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000 grayscale-[30%] group-hover:grayscale-0">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60 group-hover:opacity-80 transition-opacity"></div>
                    <div class="absolute bottom-8 left-8 text-white">
                        <h3 class="serif text-2xl md:text-3xl mb-2">${p.name}</h3>
                        <p class="text-[10px] tracking-widest uppercase opacity-70">IDR ${p.price}</p>
                    </div>
                </div>
            </div>
        `).join('');

        // Render 2 Extra Produk Lingkaran
        document.getElementById('extra-list').innerHTML = products.slice(4, 6).map(p => `
            <div class="flex items-center space-x-8 cursor-pointer group" onclick="openModal('${p.name}', '${p.price}', '${p.img}', '${p.desc}')">
                <div class="w-32 h-32 md:w-44 md:h-44 rounded-full overflow-hidden flex-shrink-0 border-4 border-white dark:border-white/10 shadow-xl group-hover:rotate-12 transition-all duration-700">
                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-125 transition duration-1000">
                </div>
                <div>
                    <h3 class="serif text-2xl md:text-3xl mb-2 text-iql-brown dark:text-[#f8f1ed]">${p.name}</h3>
                    <p class="text-[10px] tracking-widest uppercase text-iql-accent dark:text-iql-gold font-bold">Explore Detail</p>
                </div>
            </div>
        `).join('');

        // Swiper Inits
        new Swiper(".heroSwiper", { 
            loop: true, 
            autoplay: { delay: 5000 }, 
            pagination: { el: ".swiper-pagination", clickable: true },
            effect: "fade",
            fadeEffect: { crossFade: true }
        });
        
        new Swiper(".productSwiper", { 
            slidesPerView: 1.2, 
            spaceBetween: 20, 
            breakpoints: { 768: { slidesPerView: 2.5 }, 1024: { slidesPerView: 3.2 } } 
        });

        // Modal Functions
        function openModal(name, price, img, desc) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = 'IDR ' + price;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-wa-link').href = `https://wa.me/6281234567890?text=Halo+IQL,+saya+tertarik+dengan+${name}`;
            const m = document.getElementById('product-modal');
            m.classList.remove('hidden'); m.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            const m = document.getElementById('product-modal');
            m.classList.add('hidden'); m.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
            } else {
                darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
            }
        }
        updateIcons();
        themeBtn.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        }

        // Animation Styles
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
