<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Aesthetic Mixes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .mix-card:hover img { transform: scale(1.05); }
        #spotifyModal.hidden { display: none; opacity: 0; }
        #spotifyModal.flex { display: flex; opacity: 1; }
    </style>
</head>
<body class="text-neutral-800">

    <nav class="p-4 md:p-6 flex justify-between items-center border-b border-neutral-100 bg-white sticky top-0 z-10">
        <h1 class="text-lg md:text-xl font-bold tracking-tighter uppercase text-neutral-900">Mixes Archive</h1>
        <div class="space-x-4 md:space-x-6 text-xs md:text-sm font-medium">
            <a href="#" class="hover:text-neutral-500 underline underline-offset-4 text-neutral-900">Mixes</a>
            <a href="#" class="hover:text-neutral-500">About</a>
        </div>
    </nav>

    <header class="py-12 md:py-20 px-4 md:px-6 text-center bg-[#f8f8f8]">
        <p class="text-[10px] uppercase tracking-[0.25em] mb-3 text-neutral-400">Curated Soundscapes</p>
        <h2 class="text-3xl md:text-5xl font-light mb-4 tracking-tight">Explore the Mixes</h2>
        <p class="max-w-xs md:max-w-md mx-auto text-neutral-500 text-xs md:text-sm leading-relaxed italic">
            "Music is the shorthand of emotion."
        </p>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-10 lg:p-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
            
            <div class="mix-card group cursor-pointer" onclick="openModal('7ovv8D8HlYmAn1m0m5L03W')">
                <div class="overflow-hidden rounded-sm bg-neutral-200 aspect-[4/5] mb-3 relative">
                    <img src="https://images.unsplash.com/photo-1459749411177-042180ce673c?q=80&w=1000" class="w-full h-full object-cover transition-transform duration-700 ease-out">
                    <div class="absolute inset-0 bg-black/20 md:opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <i data-lucide="play" class="text-white w-10 h-10 fill-current"></i>
                    </div>
                </div>
                <h3 class="font-semibold text-base md:text-lg uppercase tracking-wider">Midnight Drive</h3>
                <p class="text-[11px] md:text-xs text-neutral-400 font-light uppercase tracking-widest">Lo-fi / Jazz</p>
            </div>

            <div class="mix-card group cursor-pointer" onclick="openModal('37i9dQZF1DX4sWSp4Status')">
                <div class="overflow-hidden rounded-sm bg-neutral-200 aspect-[4/5] mb-3 relative">
                    <img src="https://images.unsplash.com/photo-1514525253344-f814d0743b17?q=80&w=1000" class="w-full h-full object-cover transition-transform duration-700 ease-out">
                    <div class="absolute inset-0 bg-black/20 md:opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <i data-lucide="play" class="text-white w-10 h-10 fill-current"></i>
                    </div>
                </div>
                <h3 class="font-semibold text-base md:text-lg uppercase tracking-wider">Golden Hour</h3>
                <p class="text-[11px] md:text-xs text-neutral-400 font-light uppercase tracking-widest">Indie / Acoustic</p>
            </div>

            <div class="mix-card group cursor-pointer" onclick="openModal('37i9dQZF1DX8Ueb99uiM+p')">
                <div class="overflow-hidden rounded-sm bg-neutral-200 aspect-[4/5] mb-3 relative">
                    <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=1000" class="w-full h-full object-cover transition-transform duration-700 ease-out">
                    <div class="absolute inset-0 bg-black/20 md:opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <i data-lucide="play" class="text-white w-10 h-10 fill-current"></i>
                    </div>
                </div>
                <h3 class="font-semibold text-base md:text-lg uppercase tracking-wider">Deep Focus</h3>
                <p class="text-[11px] md:text-xs text-neutral-400 font-light uppercase tracking-widest">Ambient / Techno</p>
            </div>

        </div>
    </main>

    <div id="spotifyModal" class="hidden fixed inset-0 z-50 bg-black/90 backdrop-blur-md items-center justify-center p-4 md:p-6" onclick="closeModal()">
        <div class="w-full max-w-lg relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute -top-10 right-0 text-white flex items-center gap-2 text-[10px] uppercase tracking-[0.2em]">
                Close <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <div id="iframeContainer" class="rounded-xl overflow-hidden shadow-2xl">
                </div>
        </div>
    </div>

    <footer class="py-12 border-t border-neutral-50 text-center">
        <div class="flex justify-center space-x-8 mb-6">
            <a href="#" class="text-neutral-400 hover:text-black transition-colors"><i data-lucide="instagram" class="w-5 h-5"></i></a>
            <a href="#" class="text-neutral-400 hover:text-black transition-colors"><i data-lucide="youtube" class="w-5 h-5"></i></a>
        </div>
        <p class="text-[9px] text-neutral-400 tracking-[0.4em] uppercase">Digital Archive © 2026</p>
    </footer>

    <script>
        lucide.createIcons();
        const modal = document.getElementById('spotifyModal');
        const container = document.getElementById('iframeContainer');

        function openModal(id) {
            container.innerHTML = `<iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/${id}?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            container.innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
