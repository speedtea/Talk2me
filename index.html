<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Brand | Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 1.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-black antialiased">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-xl font-bold tracking-tighter italic">ATAN.</div>
        <div class="space-x-8 text-sm uppercase tracking-widest hidden md:flex">
            <a href="#" class="hover:line-through">Works</a>
            <a href="#" class="hover:line-through">About</a>
            <a href="#" class="hover:line-through">Contact</a>
        </div>
        <button class="md:hidden">Menu</button>
    </nav>

    <main class="max-w-7xl mx-auto px-8 pt-20 pb-32 fade-in">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            
            <div class="order-2 md:order-1">
                <p class="text-sm uppercase tracking-[0.3em] mb-4 text-gray-400">Digital Creator & Designer</p>
                <h1 class="text-5xl md:text-8xl font-bold leading-none mb-8">
                    CREATING <br> <span class="text-gray-300">VOID</span> BEYOND.
                </h1>
                <p class="max-w-md text-gray-600 leading-relaxed mb-10">
                    Fokus pada minimalisme, estetika modern, dan pengalaman pengguna yang intuitif. Membangun masa depan digital satu piksel setiap waktu.
                </p>
                <a href="mailto:hello@domain.com" class="inline-block border-b-2 border-black pb-1 font-bold hover:text-gray-500 hover:border-gray-500 transition-all">
                    GET IN TOUCH
                </a>
            </div>

            <div class="order-1 md:order-2">
                <div class="bg-gray-100 aspect-square rounded-2xl overflow-hidden shadow-2xl transition-transform hover:scale-[1.02] duration-500">
                    <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000" 
                         alt="Hero Image" class="w-full h-full object-cover mix-blend-multiply grayscale">
                </div>
            </div>

        </div>
    </main>

    <footer class="px-8 py-12 border-t border-gray-100 max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-[10px] tracking-[0.5em] text-gray-400 uppercase">
        <div class="mb-4 md:mb-0">© 2026 ATANRBX — ALL RIGHTS RESERVED</div>
        <div class="flex space-x-8">
            <a href="#" class="hover:text-black">Instagram</a>
            <a href="#" class="hover:text-black">Twitter</a>
            <a href="#" class="hover:text-black">Behance</a>
        </div>
    </footer>

</body>
</html>
