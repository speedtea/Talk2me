<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL | Member Registration</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'iql-brown': '#5c4033', 'iql-accent': '#8b5e3c', 'iql-bg': '#fdfaf5' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfaf5; }
        .serif { font-family: 'Playfair Display', serif; }
        .modal { transition: all 0.3s ease; opacity: 0; pointer-events: none; visibility: hidden; }
        .modal.active { opacity: 1; pointer-events: auto; visibility: visible; }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-black/5">
        <div class="text-2xl font-bold tracking-[0.2em] text-iql-brown uppercase serif">IQL.</div>
        <button onclick="toggleModal('register-modal')" class="bg-iql-brown text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-black transition-all">
            Daftar Member
        </button>
    </nav>

    <section class="max-w-4xl mx-auto px-6 py-32 text-center">
        <span class="text-[10px] uppercase tracking-[0.5em] text-iql-accent font-bold mb-4 block">Official Member Portal</span>
        <h1 class="text-5xl md:text-7xl serif mb-8 italic">Gabung Bersama <br>Komunitas IQL.</h1>
        <p class="text-gray-500 leading-loose mb-10">Daftarkan email Anda untuk mendapatkan verifikasi keanggotaan dan akses ke koleksi terbatas kami.</p>
        <div class="flex justify-center space-x-4">
            <button onclick="toggleModal('register-modal')" class="border border-iql-brown text-iql-brown px-8 py-3 text-[10px] uppercase tracking-widest font-bold">Mulai Pendaftaran</button>
        </div>
    </section>

    <div id="register-modal" class="modal fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md p-10 rounded-3xl shadow-2xl relative">
            <button onclick="toggleModal('register-modal')" class="absolute top-6 right-6 text-gray-400 hover:text-black"><i data-lucide="x"></i></button>
            
            <h2 class="text-3xl serif mb-2">Formulir Anggota</h2>
            <p class="text-gray-400 text-sm mb-8">Data Anda akan kami verifikasi via email.</p>
            
            <form action="https://formspree.io/f/xdawvkea" method="POST" class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2 block">Nama Lengkap</label>
                    <input type="text" name="Nama" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:border-iql-brown transition-all" placeholder="Contoh: Budi Santoso">
                </div>
                
                <div>
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2 block">Alamat Email</label>
                    <input type="email" name="Email" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:border-iql-brown transition-all" placeholder="email@anda.com">
                </div>

                <div>
                    <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2 block">Pesan Tambahan (Opsional)</label>
                    <textarea name="Pesan" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:border-iql-brown transition-all" rows="3" placeholder="Ingin tanya sesuatu?"></textarea>
                </div>

                <button type="submit" class="w-full bg-iql-brown text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] text-xs shadow-lg hover:shadow-2xl hover:bg-black transition-all">
                    Kirim & Daftar
                </button>
            </form>
            <p class="text-[9px] text-gray-400 text-center mt-6 uppercase tracking-widest leading-relaxed">
                Dengan mendaftar, Anda menyetujui kebijakan privasi IQL Studio.
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
        }
    </script>
</body>
</html>
