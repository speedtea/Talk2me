<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL | Artisanal Leather Goods</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        // Script untuk cek tema saat pertama kali load
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class', // Sekarang menggunakan class 'dark' manual
            theme: {
                extend: {
                    colors: { 
                        'iql-brown': '#5c4033', 
                        'iql-accent': '#8b5e3c', 
                        'iql-dark': '#1a1412' 
                    }
                }
            }
        }
    </script>

    <style>
        :root { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            position: relative;
            display: inline-block;
        }
        .brand-logo::after {
            content: ''; position: absolute; width: 100%; transform: scaleX(0); height: 1px;
            bottom: 0; left: 0; background-color: currentColor;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .brand-logo:hover::after { transform: scaleX(1); }
        .swiper-pagination-bullet-active { background: #5c4033 !important; }
        .float-wa { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
    </style>
</head>
<body class="antialiased bg-[#fdfaf5] text-[#3a2a21] dark:bg-iql-dark dark:text-[#eee4de]">

    <a href="https://wa.me/6281234567890" target="_blank" class="fixed bottom-6 right-6 z-[100] bg-[#25D366] text-white p-4 rounded-full shadow-2xl float-wa hover:scale-110 transition-transform">
        <i data-lucide="message-circle" class="w-6 h-6"></i>
    </a>

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50 bg-white/95 dark:bg-iql-dark/95 backdrop-blur-sm border-b border-black/5 dark:border-white/5">
        <div class="brand-logo text-xl md:text-2xl text-iql-brown dark:text-[#eee4de]">IQL</div>
        
        <div class="hidden lg:flex space-x-10 text-[10px] uppercase tracking-[0.2em] font-bold text-gray-400">
            <a href="#home" class="hover:text-iql-brown dark:hover:text-white transition-colors">Home</a>
            <a href="#koleksi" class="hover:text-iql-brown dark:hover:text-white transition-colors">Shop</a>
            <a href="https://instagram.com/USERNAME_IG" target="_blank" class="hover:text-iql-brown dark:hover:text-white transition-colors">Instagram</a>
        </div>
        
        <div class="flex items-center space-x-3 md:space-x-6">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
                <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5 text-yellow-400"></i>
            </button>
            
            <a href="https://wa.me/6281234567890" class="text-[9px] font-bold uppercase tracking-widest bg-iql-brown text-white px-5 py-2.5 rounded-full hover:bg-black transition-all">Contact</a>
        </div>
    </nav>

    <header id="home" class="relative w-full h-[65vh] md:h-[85vh]">
        <div class="swiper heroSwiper h-full w-full">
            <div class="swiper-wrapper">
                <div class="swiper-slide relative">
                    <img src="https://images.unsplash.com/photo-1473187983305-f615310e7daa?q=80&w=2000" class="w-full h-full object-cover brightness-[0.9] dark:brightness-[0.7]">
                    <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center text-center text-white p-6">
                        <h1 class="text-5xl md:text-8xl serif mb-10 italic">The Heritage</h1>
                        <a href="#koleksi" class="bg-white text-black px-12 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-iql-brown hover:text-white transition-all">Shop Now</a>
                    </div>
                </div>
                <div class="swiper-slide relative">
                    <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=2000" class="w-full h-full object-cover brightness-[0.9] dark:brightness-[0.7]">
                    <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center text-center text-white p-6">
                        <h1 class="text-5xl md:text-8xl serif mb-10">Timeless Style</h1>
                        <a href="https://wa.me/6281234567890" class="bg-white text-black px-12 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-iql-brown hover:text-white transition-all">Custom Order</a>
                    </div>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </header>

    <section id="koleksi" class="py-24">
        <div class="max-w-7xl mx-auto px-6 mb-16 text-center">
            <h2 class="text-4xl serif italic mb-3">Featured Products</h2>
            <div class="w-16 h-px bg-iql-brown dark:bg-iql-accent mx-auto opacity-30"></div>
        </div>

        <div class="swiper productSwiper max-w-7xl mx-auto px-6 !pb-12">
            <div class="swiper-wrapper">
                <script>
                    const featured = [
                        { name: "Oxford Tote", price: "1.250.000", img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?q=80&w=800" },
                        { name: "Slim Wallet", price: "450.000", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?q=80&w=800" },
                        { name: "Classic Belt", price: "350.000", img: "https://images.unsplash.com/photo-1530173336844-31533318079a?q=80&w=800" },
                        { name: "Traveler Pouch", price: "750.000", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=800" }
                    ];
                    document.write(featured.map(p => `
                        <div class="swiper-slide px-2">
                            <div class="group relative bg-white dark:bg-[#251c1a] rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 border border-transparent dark:border-white/5">
                                <div class="relative aspect-[3/4] overflow-hidden">
                                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                                    <button onclick="shareProduct('${p.name}')" class="absolute top-4 right-4 bg-white/90 dark:bg-black/50 p-2.5 rounded-full z-10 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="share-2" class="w-3.5 h-3.5"></i></button>
                                    <a href="https://shopee.co.id" target="_blank" class="absolute bottom-0 w-full bg-iql-brown text-white py-4 text-center text-[10px] font-bold uppercase translate-y-full group-hover:translate-y-0 transition-transform">Beli di Shopee</a>
                                </div>
                                <div class="p-5 text-center">
                                    <h3 class="serif text-lg">${p.name}</h3>
                                    <p class="text-iql-accent dark:text-[#d4af37] font-bold text-sm mt-1.5">IDR ${p.price}</p>
                                </div>
                            </div>
                        </div>
                    `).join(''));
                </script>
            </div>
            <div class="swiper-pagination !static mt-8"></div>
        </div>
    </section>

    <footer class="py-20 px-6 bg-white dark:bg-[#150f0d] border-t border-black/5 dark:border-white/5 text-center">
        <div class="text-3xl brand-logo mb-10 text-iql-brown dark:text-[#eee4de]">IQL</div>
        <div class="mb-12">
            <p class="text-[8px] uppercase tracking-[0.3em] text-gray-400 mb-5 font-bold">Metode Pembayaran</p>
            <div class="flex flex-wrap justify-center items-center gap-6 md:gap-9 opacity-50 dark:opacity-30 grayscale">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" alt="BCA" class="h-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/Bank_Mandiri_logo_2016.svg" alt="Mandiri" class="h-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Logo_GoPay.svg" alt="GOPAY" class="h-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Logo_ShopeePay.svg" alt="ShopeePay" class="h-4">
            </div>
        </div>
        <p class="text-[9px] text-gray-400 uppercase tracking-[0.3em] font-light italic">© 2026 IQL Indonesia</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        lucide.createIcons();

        // LOGIC DARK MODE SWITCHER
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
                themeToggleLightIcon.classList.add('hidden');
            }
        }
        updateIcons();

        themeToggleBtn.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('color-theme', 'dark');
            } else {
                localStorage.setItem('color-theme', 'light');
            }
            updateIcons();
        });

        // SWIPER SCRIPTS
        new Swiper(".heroSwiper", { loop: true, autoplay: { delay: 5000 }, pagination: { el: ".swiper-pagination", clickable: true } });
        new Swiper(".productSwiper", { 
            slidesPerView: 1.3, spaceBetween: 15, pagination: { el: ".swiper-pagination", clickable: true },
            breakpoints: { 640: { slidesPerView: 2.3 }, 1024: { slidesPerView: 4 } }
        });

        function shareProduct(name) {
            if (navigator.share) {
                navigator.share({ title: 'IQL Produk', text: 'Cek ' + name + ' dari IQL Studio', url: window.location.href });
            } else { alert("Link disalin!"); }
        }
    </script>
</body>
</html>
