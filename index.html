<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQL | Artisanal Leather Goods</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        // System Dark Mode Detection
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        'iql-brown': '#3a2a21', 
                        'iql-accent': '#8b5e3c', 
                        'iql-dark': '#0f0a09' 
                    }
                }
            }
        }
    </script>

    <style>
        :root { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s, color 0.4s; }
        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { font-family: 'Playfair Display', serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5em; }
        
        /* Modal Animation */
        #product-modal { transition: opacity 0.3s ease; }
        #product-modal.hidden { opacity: 0; pointer-events: none; display: none; }
        #product-modal.flex { opacity: 1; pointer-events: auto; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a2a21; border-radius: 10px; }
    </style>
</head>
<body class="antialiased bg-[#fdfaf5] text-[#1a1412] dark:bg-iql-dark dark:text-[#f8f1ed]">

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50 bg-[#fdfaf5]/90 dark:bg-iql-dark/90 backdrop-blur-md border-b border-black/5 dark:border-white/5">
        <a href="#" class="brand-logo text-xl md:text-2xl text-iql-brown dark:text-[#f8f1ed] hover:opacity-60 transition-opacity">
            IQL
        </a>
        
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
                <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5 text-yellow-400"></i>
            </button>
            <a href="https://wa.me/6281234567890" class="hidden md:block text-[10px] font-bold uppercase tracking-widest bg-[#1a1412] dark:bg-[#f8f1ed] text-white dark:text-[#1a1412] px-8 py-3 rounded-full hover:opacity-80 transition-all">Contact Us</a>
        </div>
    </nav>

    <header class="relative w-full h-[70vh] flex items-center justify-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1473187983305-f615310e7daa?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover brightness-75 dark:brightness-50 transition-all duration-1000 scale-105 hover:scale-100">
        <div class="relative text-center text-white p-6">
            <h1 class="text-6xl md:text-9xl serif italic mb-6 leading-tight drop-shadow-2xl">The Heritage</h1>
            <p class="text-[10px] md:text-[12px] uppercase tracking-[0.6em] opacity-90 font-light">Artisanal Leather Excellence</p>
        </div>
    </header>

    <section id="koleksi" class="py-24 max-w-7xl mx-auto px-6">
        <div class="flex flex-col items-center mb-20">
            <h2 class="text-4xl serif italic mb-4">Our Collection</h2>
            <div class="w-16 h-px bg-iql-brown dark:bg-white opacity-20"></div>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-3 gap-8 md:gap-16" id="product-grid">
            </div>
    </section>

    <div class="fixed bottom-8 left-8 z-[100]">
        <button onclick="document.getElementById('koleksi').scrollIntoView({behavior: 'smooth'})" 
                class="bg-[#1a1412] dark:bg-[#f8f1ed] text-white dark:text-[#1a1412] p-4 md:p-5 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.3)] hover:scale-110 active:scale-95 transition-all flex items-center group overflow-hidden">
            <i data-lucide="shopping-bag" class="w-6 h-6"></i>
            <span class="max-w-0 opacity-0 group-hover:max-w-xs group-hover:opacity-100 group-hover:ml-3 transition-all duration-500 text-[10px] font-bold uppercase tracking-widest whitespace-nowrap">
                Shop Collection
            </span>
        </button>
    </div>

    <div id="product-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-[#fdfaf5] dark:bg-[#1a1412] max-w-3xl w-full rounded-[2rem] overflow-hidden relative shadow-2xl flex flex-col md:flex-row border border-white/5">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-10 p-2 bg-black/5 dark:bg-white/10 rounded-full hover:bg-red-500 hover:text-white transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="w-full md:w-1/2 aspect-square">
                <img id="modal-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="w-full md:w-1/2 p-10 md:p-14 flex flex-col justify-center">
                <h2 id="modal-title" class="text-4xl serif italic mb-3"></h2>
                <p id="modal-price" class="text-iql-accent dark:text-[#d4af37] font-bold text-xl mb-6"></p>
                <div class="w-10 h-0.5 bg-iql-brown dark:bg-white mb-6 opacity-20"></div>
                <p id="modal-desc" class="text-sm opacity-70 mb-10 leading-relaxed font-light"></p>
                <a id="modal-wa-link" href="#" target="_blank" class="bg-[#1a1412] dark:bg-[#f8f1ed] text-white dark:text-[#1a1412] text-center py-5 rounded-full text-[10px] font-bold uppercase tracking-widest hover:tracking-[0.2em] transition-all">
                    Order via WhatsApp
                </a>
            </div>
        </div>
    </div>

    <footer class="py-24 text-center border-t border-black/5 dark:border-white/5 bg-white/50 dark:bg-black/20">
        <div class="brand-logo text-3xl mb-8 text-iql-brown dark:text-[#f8f1ed] opacity-50">IQL</div>
        <p class="text-[9px] uppercase tracking-[0.6em] opacity-40">Handcrafted Excellence • Indonesia</p>
        <p class="text-[8px] mt-10 opacity-30 uppercase tracking-widest">© 2026 IQL Artisanal Leather Goods</p>
    </footer>

    <script>
        lucide.createIcons();

        // 1. DATA 6 PRODUK (Ubah Nama, Harga, Gambar, & Deskripsi di sini)
        const products = [
            { name: "Oxford Tote", price: "1.250.000", img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?q=80&w=800", desc: "Tas tote berkapasitas besar dengan material kulit sapi pull-up asli. Sangat tahan lama untuk penggunaan harian." },
            { name: "Slim Wallet", price: "450.000", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?q=80&w=800", desc: "Dompet ramping dengan jahitan tangan yang presisi. Cocok bagi Anda yang menyukai gaya minimalis." },
            { name: "Classic Belt", price: "350.000", img: "https://images.unsplash.com/photo-1530173336844-31533318079a?q=80&w=800", desc: "Ikat pinggang kulit sapi kualitas ekspor dengan buckle solid metal yang tahan karat." },
            { name: "Travel Case", price: "750.000", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=800", desc: "Tempat penyimpanan serbaguna untuk gadget atau paspor Anda saat melakukan perjalanan jauh." },
            { name: "Card Holder", price: "150.000", img: "https://images.unsplash.com/photo-1614352232749-92c2a9c336b9?q=80&w=800", desc: "Kecil, praktis, dan mewah. Solusi penyimpanan kartu paling ringkas untuk mobilitas tinggi." },
            { name: "Camera Strap", price: "250.000", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?q=80&w=800", desc: "Memberikan kenyamanan ekstra di leher Anda saat memotret seharian. Kuat menahan beban kamera DSLR." }
        ];

        // 2. RENDER PRODUK KE GRID
        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => `
            <div class="group cursor-pointer" onclick="openModal('${p.name}', '${p.price}', '${p.img}', '${p.desc}')">
                <div class="relative aspect-[4/5] overflow-hidden rounded-3xl mb-6 bg-gray-100 dark:bg-white/5 shadow-sm hover:shadow-2xl transition-all duration-700">
                    <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000 grayscale-[20%] group-hover:grayscale-0">
                    <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </div>
                <div class="text-center">
                    <h3 class="serif text-lg md:text-2xl mb-1">${p.name}</h3>
                    <p class="text-[10px] md:text-[11px] opacity-40 uppercase tracking-[0.3em] font-semibold italic">IDR ${p.price}</p>
                </div>
            </div>
        `).join('');

        // 3. MODAL LOGIC
        function openModal(name, price, img, desc) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = 'IDR ' + price;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-wa-link').href = `https://wa.me/6281234567890?text=Halo+IQL,+saya+ingin+order+produk+${name}`;
            
            const modal = document.getElementById('product-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('product-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        // 4. THEME TOGGLE LOGIC
        const themeBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        
        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
            } else {
                darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
            }
        }
        updateIcons();
        themeBtn.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        }
    </script>
</body>
            </html>
